{% extends 'common/base.html' %}

{% block extra_css %}
<style>
    /* Category cards */
    .category-card {
        border-radius: 16px;
        overflow: hidden;
        transition: transform .2s, box-shadow .2s;
        cursor: pointer;
    }
    .category-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,.12); }
    .category-card .icon { font-size: 2.5rem; }

</style>
{% endblock %}

{% block content %}
<!-- Categories Section -->
<section class="py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Shop by Category</h2>
                <p class="text-muted mb-0">Browse our wide selection of categories</p>
            </div>
        </div>
        <div class="row g-3">
            {% for category in categories %}
            <div class="col-6 col-md-4 col-lg-2">
                <a href="{% url 'category_products' category.id %}" class="text-decoration-none">
                    <div class="category-card card h-100 text-center p-3 border-0 shadow-sm">
                        <div class="icon mb-2">{{ category.icon | safe }}</div>
                        <div class="fw-semibold small">{{ category.name }}</div>
                        <div class="text-muted" style="font-size:.75rem">{{ category.product_count }} item</div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
